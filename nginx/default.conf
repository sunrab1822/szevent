server {
    listen 80;
    server_name _;

    # Serve React frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;  # SPA fallback
    }

    # Serve Laravel public storage (profile pictures, uploads, etc.)
    # Requires the "storage" volume to be shared between the backend
    # and this nginx container (see docker-compose note below).
    location /storage/ {
        alias /var/www/storage/app/public/;
        try_files $uri =404;
    }

    # Proxy API calls to Laravel (PHP-FPM via FastCGI)
    location /api/ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}