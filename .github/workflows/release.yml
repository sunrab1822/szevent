name: Monorepo Production Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_BRANCH: deploy
  STACK_FILE: deploy/docker-stack.prod.yml

jobs:
  verify_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag and paths
        run: |
          set -eu
          
          echo "--- Fájlok ellenőrzése ---"
          test -f "$STACK_FILE" || { echo "HIBA: Nem találom ezt: $STACK_FILE"; exit 1; }
          test -f "frontend/Dockerfile" || { echo "HIBA: Nem találom ezt: frontend/Dockerfile"; exit 1; }
          test -f "backend/Dockerfile" || { echo "HIBA: Nem találom ezt: backend/Dockerfile"; exit 1; }
          echo "Minden fájl a helyén van!"

          echo "--- Git történet ellenőrzése ---"
          git fetch origin main --tags
          if ! git merge-base --is-ancestor "${{ github.sha }}" "origin/main"; then
            echo "ERROR: A megjelölt commit nem a main ágról származik!"
            exit 1
          fi

  build_images:
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache,mode=max

  update_deploy_branch:
    needs: build_images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Author
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync Deploy Branch and Update Stack
        shell: bash
        run: |
          set -euo pipefail

          export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}"
          export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}"

          echo "Fetching deployment branch and main"
          git fetch origin main "${{ env.DEPLOY_BRANCH }}" --tags

          echo "Checking out ${{ env.DEPLOY_BRANCH }}"
          git checkout -B "${{ env.DEPLOY_BRANCH }}" "origin/${{ env.DEPLOY_BRANCH }}"

          echo "Syncing ${{ env.DEPLOY_BRANCH }} with origin/main"
          if ! git merge --no-edit origin/main; then
            echo "Merge conflict detected"

            CONFLICTS="$(git diff --name-only --diff-filter=U)"

            if [ "$CONFLICTS" = "$STACK_FILE" ]; then
              echo "Auto-resolving $STACK_FILE using the origin/main version"

              # While merging origin/main into deploy:
              # --theirs means the origin/main version.
              git checkout --theirs "$STACK_FILE"
              git add "$STACK_FILE"

              git commit --no-edit
            else
              echo "ERROR: merge conflicts found outside $STACK_FILE"
              echo "$CONFLICTS"
              exit 1
            fi
          fi

          echo "Updating image references in $STACK_FILE"
          echo "Frontend: $FRONTEND_IMAGE"
          echo "Backend:  $BACKEND_IMAGE"

          yq -i '
            .services.frontend.image = env(FRONTEND_IMAGE) |
            .services.backend.image = env(BACKEND_IMAGE) |
            .services.scheduler.image = env(BACKEND_IMAGE)
          ' "$STACK_FILE"

          git add "$STACK_FILE"

          if git diff --cached --quiet; then
            echo "No stack changes after merge and image update"
            exit 0
          fi

          git commit -m "chore(deploy): release ${{ github.ref_name }} from ${{ github.sha }} [skip ci]"
          git push origin HEAD:"${{ env.DEPLOY_BRANCH }}"

          echo "Deployment branch updated successfully"
