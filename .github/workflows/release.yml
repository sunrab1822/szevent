name: Monorepo Production Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_BRANCH: deploy
  STACK_FILE: deploy/docker-stack.prod.yml

jobs:
  verify_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release tag and paths
        run: |
          set -eu
          test -f "$STACK_FILE"
          test -f "frontend/Dockerfile"
          test -f "backend/Dockerfile"

          git fetch origin main --tags
          if ! git merge-base --is-ancestor "${{ github.sha }}" "origin/main"; then
            echo "ERROR: tagged commit is not reachable from origin/main"
            exit 1
          fi

  build_images:
    needs: verify_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 1. FRONTEND BUILD
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:buildcache,mode=max

      # 2. BACKEND BUILD
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:buildcache,mode=max

  update_deploy_branch:
    needs: build_images
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Author
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Sync Deploy Branch and Update Stack
        run: |
          set -eu
          
          # Pontos image elérési utak definiálása változókba a yq számára
          export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.ref_name }}"
          export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.ref_name }}"
          
          git fetch origin ${{ env.DEPLOY_BRANCH }}
          git checkout -B ${{ env.DEPLOY_BRANCH }} origin/${{ env.DEPLOY_BRANCH }}
          
          git merge --no-edit origin/main

          # A yq paranccsal egyszerre átírjuk mindhárom szolgáltatás image-ét
          yq -i '.services.frontend.image = env(FRONTEND_IMAGE) | .services.backend.image = env(BACKEND_IMAGE) | .services.scheduler.image = env(BACKEND_IMAGE)' "$STACK_FILE"
          
          git add "$STACK_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(deploy): release monorepo ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:${{ env.DEPLOY_BRANCH }}